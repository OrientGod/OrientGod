<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>正在跳转至服务器...</title>
    <style>
        body{text-align:center;margin-top:20%;font-family:Arial}
    </style>
</head>
<body>
    <h2>正在获取服务器地址，请稍候...</h2>

    <script>
        document.write('<script src="ip.js?t='+new Date().getTime()+'"><\/script>');

    <script>
        setTimeout(() => {
            if (typeof SERVER_URL !== 'undefined') {

            }
        }, 500);
    </script>
